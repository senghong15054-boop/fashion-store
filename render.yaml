services:
  - type: web
    name: fashion-store-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URLS
        value: https://your-frontend-domain.vercel.app
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: tshirt_store
      - key: JWT_SECRET
        sync: false
      - key: ABA_KHQR_PAYLOAD
        sync: false
